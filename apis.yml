aid: weblate
name: Weblate
description: >-
  Weblate is an open-source web-based localization platform that provides a
  comprehensive REST API for managing translation projects, components, strings,
  and contributors. The platform enables continuous localization workflows with
  tight version control integration, supporting Git, GitHub, GitLab, and other
  VCS systems. Developers can use the API to automate translation management,
  trigger repository synchronization, retrieve translation statistics, and
  orchestrate automated translation workflows. Weblate is available as a hosted
  SaaS service or as a self-hosted open-source deployment.
