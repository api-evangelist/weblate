apis:
  - aid: weblate:weblate-rest-api
    name: Weblate REST API
    description: >-
      The Weblate REST API provides full programmatic access to the localization
      platform, enabling management of translation projects, components,
      translations, strings, languages, users, groups, and repository
      operations. The API is built on Django REST Framework and documented via
      OpenAPI 3.1 schema, accessible at /api/schema/. Authentication uses
      token-based access with personal access tokens (wlu_ prefix) or
      project-scoped tokens (wlp_ prefix).
